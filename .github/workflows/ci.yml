name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['main']

env:
  PROJECT_DIR: G-claude-repair-ocr-bugs-gQxxl (1)/G-claude-repair-ocr-bugs-gQxxl/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd "$PROJECT_DIR" && npm install --no-audit --no-fund
      - run: cd "$PROJECT_DIR" && npm run lint
      - run: cd "$PROJECT_DIR" && npm test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd "$PROJECT_DIR" && npm install --no-audit --no-fund
      - run: cd "$PROJECT_DIR" && npm run build
      - name: Verify build output
        run: |
          cd "$PROJECT_DIR"
          if [ ! -d dist ]; then
            echo "ERROR: dist/ directory not found after build"
            exit 1
          fi
          echo "Build output OK: $(find dist -type f | wc -l) files"

  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "${{ env.PROJECT_DIR }}/src-tauri -> target"
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Cargo check
        working-directory: ${{ env.PROJECT_DIR }}/src-tauri
        run: cargo check
      - name: Cargo clippy
        working-directory: ${{ env.PROJECT_DIR }}/src-tauri
        run: cargo clippy -- -D warnings
