name: CI — Lint & Test

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

env:
  SOURCE_PROJECT_DIR: G-claude-repair-ocr-bugs-gQxxl (1)/G-claude-repair-ocr-bugs-gQxxl/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SOURCE_PROJECT_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.SOURCE_PROJECT_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts
        env:
          npm_config_audit: "false"
          CYPRESS_INSTALL_BINARY: "0"

      - name: Run ESLint
        run: npx eslint app/ --max-warnings 0

      - name: Build web
        run: npm run build:web

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SOURCE_PROJECT_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.SOURCE_PROJECT_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts
        env:
          npm_config_audit: "false"
          CYPRESS_INSTALL_BINARY: "0"

      - name: Run unit tests
        run: npm run test:unit
