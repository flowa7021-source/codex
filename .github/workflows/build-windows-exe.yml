name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - work
      - исправленный-код
    paths:
      - "G-claude-repair-ocr-bugs-gQxxl/**"
      - ".github/workflows/build-windows-exe.yml"
  pull_request:
    paths:
      - "G-claude-repair-ocr-bugs-gQxxl/**"
      - ".github/workflows/build-windows-exe.yml"

env:
  PROJECT_DIR: G-claude-repair-ocr-bugs-gQxxl/G-claude-repair-ocr-bugs-gQxxl/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z
  BUILD_DIR: C:/nr

jobs:
  build-exe:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare short build path (avoid Windows MAX_PATH issues)
        run: |
          if (Test-Path "${{ env.BUILD_DIR }}") {
            Remove-Item -Recurse -Force "${{ env.BUILD_DIR }}"
          }
          New-Item -ItemType Directory -Path "${{ env.BUILD_DIR }}" | Out-Null

          robocopy "${{ github.workspace }}\${{ env.PROJECT_DIR }}" "${{ env.BUILD_DIR }}" /E /NFL /NDL /NJH /NJS /NC /NS
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy failed with exit code $LASTEXITCODE"
          }

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.BUILD_DIR }}
        run: npm ci

      - name: Build portable EXE (all app resources bundled)
        working-directory: ${{ env.BUILD_DIR }}
        run: npm run build:win:nosign

      - name: Validate build output
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          if (-not (Test-Path dist)) {
            throw "dist folder not found after build"
          }

          $exeFiles = Get-ChildItem -Path dist -File -Filter *.exe
          if (-not $exeFiles) {
            Write-Host "dist contents for debugging:"
            Get-ChildItem -Path dist -File | Format-Table Name, Length
            throw "EXE artifact not found in dist"
          }

          $exeFiles | Format-Table Name, Length

      - name: Generate SHA256SUMS.txt
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          $exeFiles = Get-ChildItem -Path dist -File -Filter *.exe
          $lines = foreach ($file in $exeFiles) {
            $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256
            "${($file.Name)}  ${($hash.Hash)}"
          }

          $lines | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii
          Get-Content dist/SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novareader-windows-exe
          path: |
            ${{ env.BUILD_DIR }}/dist/*.exe
            ${{ env.BUILD_DIR }}/dist/SHA256SUMS.txt
          if-no-files-found: error
