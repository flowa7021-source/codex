name: Build Windows EXE

"on":
  workflow_dispatch:
  push:
    branches:
      - Final
  pull_request:
    branches:
      - Final

permissions:
  contents: read

concurrency:
  group: windows-exe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOURCE_PROJECT_DIR: G-claude-repair-ocr-bugs-gQxxl (1)/G-claude-repair-ocr-bugs-gQxxl/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z
  BUILD_DIR: C:/nr-build
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  ELECTRON_BUILDER_DISABLE_UPDATE_CHECK: "true"

jobs:
  build-windows:
    name: Build ready-to-use Windows EXE artifacts
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout Final branch source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show CI context
        shell: pwsh
        run: |
          Write-Host "GITHUB_ACTIONS=$env:GITHUB_ACTIONS"
          Write-Host "CI=$env:CI"
          Write-Host "GITHUB_REF=$env:GITHUB_REF"
          Write-Host "GITHUB_WORKSPACE=$env:GITHUB_WORKSPACE"

      - name: Prepare short build path (fix npm ci path/lock issues)
        shell: pwsh
        run: |
          if (Test-Path "${{ env.BUILD_DIR }}") {
            Remove-Item "${{ env.BUILD_DIR }}" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "${{ env.BUILD_DIR }}" -Force | Out-Null

          robocopy "${{ env.SOURCE_PROJECT_DIR }}" "${{ env.BUILD_DIR }}" /MIR /NFL /NDL /NJH /NJS /NP /XD node_modules dist
          $exitCode = $LASTEXITCODE
          if ($exitCode -gt 7) {
            throw "robocopy failed with exit code $exitCode"
          }

      - name: Verify project files required for desktop build
        shell: pwsh
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          $required = @(
            'package.json',
            'package-lock.json',
            'electron/main.js',
            'app/index.html',
            'app/app.js'
          )
          foreach ($file in $required) {
            if (!(Test-Path $file)) { throw "Required file not found: $file" }
          }

      - name: Verify packaging config and embedded runtime assets
        shell: pwsh
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); const files=((p.build||{}).files)||[]; const must=['app/**/*','electron/**/*','package.json']; for(const x of must){ if(!files.includes(x)){ throw new Error('Missing build.files entry: '+x); } }"

          $runtimeAssets = @(
            'app/vendor/djvu.js',
            'app/vendor/ocrad.js',
            'app/vendor/pdf.min.mjs',
            'app/vendor/pdf.worker.min.mjs',
            'app/index.html',
            'app/app.js',
            'electron/main.js'
          )
          foreach ($asset in $runtimeAssets) {
            if (!(Test-Path $asset)) { throw "Runtime asset missing: $asset" }
          }

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.SOURCE_PROJECT_DIR }}/package-lock.json

      - name: Install dependencies (clean, with retry/fallback for Windows locks)
        shell: pwsh
        working-directory: ${{ env.BUILD_DIR }}
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_progress: "false"
          CYPRESS_INSTALL_BINARY: "0"
        run: |
          npm cache verify

          $installed = $false
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "npm ci attempt $attempt/$maxAttempts"
            npm ci --no-audit --no-fund
            if ($LASTEXITCODE -eq 0) {
              $installed = $true
              Write-Host "npm ci completed successfully"
              break
            }

            Write-Warning "npm ci failed (attempt $attempt). Cleaning node_modules and npm cache..."
            if (Test-Path node_modules) {
              Remove-Item node_modules -Recurse -Force -ErrorAction SilentlyContinue
            }
            npm cache clean --force
            Start-Sleep -Seconds 5
          }

          if (-not $installed) {
            Write-Warning "npm ci failed after $maxAttempts attempts. Trying npm install as fallback..."
            npm install --no-audit --no-fund
            if ($LASTEXITCODE -ne 0) {
              throw "Dependency install failed: npm ci and fallback npm install both failed"
            }
          }

      - name: Build portable EXE (unsigned, Windows 10 compatible x64)
        shell: pwsh
        working-directory: ${{ env.BUILD_DIR }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_IDENTITY_AUTO_DISCOVERY }}
          ELECTRON_BUILDER_DISABLE_UPDATE_CHECK: ${{ env.ELECTRON_BUILDER_DISABLE_UPDATE_CHECK }}
        run: npm run build:win:nosign

      - name: Build NSIS installer EXE (unsigned, Windows 10 compatible x64)
        shell: pwsh
        working-directory: ${{ env.BUILD_DIR }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_IDENTITY_AUTO_DISCOVERY }}
          ELECTRON_BUILDER_DISABLE_UPDATE_CHECK: ${{ env.ELECTRON_BUILDER_DISABLE_UPDATE_CHECK }}
        run: npm run build:win:installer:nosign

      - name: Validate produced EXE files and bundled app payload
        shell: pwsh
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          $exeFiles = Get-ChildItem -Path dist -Filter '*.exe' -File
          if (!$exeFiles) { throw 'No EXE artifacts were produced in dist/' }

          $portable = $exeFiles | Where-Object { $_.Name -match '^NovaReader-(?!Setup-).*\.exe$' }
          if (!$portable) { throw 'Portable EXE was not produced' }

          $installer = $exeFiles | Where-Object { $_.Name -match '^NovaReader-Setup-.*\.exe$' }
          if (!$installer) { throw 'NSIS installer EXE was not produced' }

          foreach ($file in $exeFiles) {
            if ($file.Length -lt 10MB) {
              throw "Artifact too small to be a valid packaged app: $($file.Name) ($($file.Length) bytes)"
            }
          }

          if (!(Test-Path 'dist/win-unpacked/NovaReader.exe')) {
            throw 'win-unpacked/NovaReader.exe not found'
          }
          if (!(Test-Path 'dist/win-unpacked/resources/app.asar')) {
            throw 'Bundled payload missing: dist/win-unpacked/resources/app.asar'
          }

          Write-Host 'Produced EXE artifacts:'
          $exeFiles | Sort-Object Name | ForEach-Object { Write-Host "- $($_.Name) [$([Math]::Round($_.Length / 1MB, 2)) MB]" }

      - name: Archive win-unpacked app (portable folder)
        shell: pwsh
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          if (!(Test-Path 'dist/win-unpacked')) {
            throw 'dist/win-unpacked directory not found'
          }
          Compress-Archive -Path 'dist/win-unpacked/*' -DestinationPath 'dist/NovaReader-win-unpacked.zip' -Force

      - name: Generate SHA256 checksums for EXE artifacts
        shell: pwsh
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          $checksumFile = 'dist/SHA256SUMS.txt'
          if (Test-Path $checksumFile) {
            Remove-Item $checksumFile -Force
          }

          $exeFiles = Get-ChildItem -Path dist -Filter '*.exe' -File | Sort-Object Name
          if (!$exeFiles) {
            throw 'No EXE files found to checksum'
          }

          foreach ($file in $exeFiles) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $file.FullName).Hash.ToLower()
            "$hash *$($file.Name)" | Out-File -FilePath $checksumFile -Encoding utf8 -Append
          }

          if (!(Test-Path $checksumFile)) {
            throw 'Checksum file was not generated'
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novareader-windows-exe
          path: |
            ${{ env.BUILD_DIR }}/dist/*.exe
            ${{ env.BUILD_DIR }}/dist/SHA256SUMS.txt
            ${{ env.BUILD_DIR }}/dist/NovaReader-win-unpacked.zip
          if-no-files-found: error
          retention-days: 14
