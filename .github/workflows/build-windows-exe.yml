name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    branches:
      - Final
      - main
      - master
  pull_request:
    branches:
      - Final
      - main
      - master

permissions:
  contents: read

env:
  SOURCE_PROJECT_DIR: G-claude-repair-ocr-bugs-gQxxl (1)/G-claude-repair-ocr-bugs-gQxxl/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z

jobs:
  build-exe:
    runs-on: windows-2022
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh
        working-directory: ${{ github.workspace }}/${{ env.SOURCE_PROJECT_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.SOURCE_PROJECT_DIR }}/package-lock.json

      - name: Show CI context
        run: |
          Write-Host "GITHUB_ACTIONS=$env:GITHUB_ACTIONS"
          Write-Host "CI=$env:CI"
          Write-Host "GITHUB_REF=$env:GITHUB_REF"

      - name: Install dependencies
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
          CYPRESS_INSTALL_BINARY: "0"
        run: |
          $projectPath = (Get-Location).Path
          subst X: /d 2>$null
          subst X: "$projectPath"
          if ($LASTEXITCODE -ne 0) { throw "Failed to map X: for npm ci" }
          try {
            Set-Location X:\
            npm ci --no-audit --no-fund
          }
          finally {
            Set-Location $projectPath
            subst X: /d 2>$null
          }

      - name: build portable EXE
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          $projectPath = (Get-Location).Path
          subst X: /d 2>$null
          subst X: "$projectPath"
          if ($LASTEXITCODE -ne 0) { throw "Failed to map X: for build" }
          try {
            Set-Location X:\
            npm run build:win:nosign
          }
          finally {
            Set-Location $projectPath
            subst X: /d 2>$null
          }

      - name: Generate SHA256
        run: |
          $projectPath = (Get-Location).Path
          subst X: /d 2>$null
          subst X: "$projectPath"
          if ($LASTEXITCODE -ne 0) { throw "Failed to map X: for hashing" }
          try {
            Set-Location X:\
            $file = Get-ChildItem dist -Filter 'NovaReader-*.exe' -File |
              Where-Object { $_.Name -notlike 'NovaReader-Setup-*' } |
              Select-Object -First 1
            if (-not $file) { throw 'Portable EXE was not generated' }
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash *$($file.Name)" | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii
          }
          finally {
            Set-Location $projectPath
            subst X: /d 2>$null
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novareader-windows-exe
          path: |
            ${{ env.SOURCE_PROJECT_DIR }}/dist/NovaReader-*.exe
            ${{ env.SOURCE_PROJECT_DIR }}/dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
