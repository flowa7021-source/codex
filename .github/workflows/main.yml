name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - work
      - исправленный-код
      - Исправленный-код
    paths:
      - "G-claude-repair-ocr-bugs-gQxxl/**"
      - ".github/workflows/main.yml"
  pull_request:
    paths:
      - "G-claude-repair-ocr-bugs-gQxxl/**"
      - ".github/workflows/main.yml"

env:
  PROJECT_DIR: G-claude-repair-ocr-bugs-gQxxl/G-claude-repair-ocr-bugs-gQxxl/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z/codex-codex-develop-modern-alternative-to-djvu-reader-uuxh9z

jobs:
  build-exe:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build standalone portable EXE (all resources bundled)
        run: npm run build:win:nosign

      - name: List dist files
        run: Get-ChildItem dist -File | Format-Table Name, Length

      - name: Generate SHA256 checksums
        run: |
          $artifacts = Get-ChildItem dist -File | Where-Object {
            $_.Extension -in @('.exe', '.7z', '.blockmap', '.yml')
          }

          if (-not $artifacts) {
            throw "Build artifacts not found in dist"
          }

          $exeArtifacts = $artifacts | Where-Object { $_.Extension -eq '.exe' }
          if (-not $exeArtifacts) {
            throw "EXE artifact not found in dist"
          }

          foreach ($artifact in $exeArtifacts) {
            $hash = Get-FileHash $artifact.FullName -Algorithm SHA256
            "${($artifact.Name)}  ${($hash.Hash)}" |
              Out-File -FilePath (Join-Path dist "$($artifact.Name).sha256") -Encoding ascii
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novareader-windows-build
          path: |
            ${{ env.PROJECT_DIR }}/dist/*.exe
            ${{ env.PROJECT_DIR }}/dist/*.sha256
            ${{ env.PROJECT_DIR }}/dist/*.yml
            ${{ env.PROJECT_DIR }}/dist/*.blockmap
            ${{ env.PROJECT_DIR }}/dist/*.7z
          if-no-files-found: error
