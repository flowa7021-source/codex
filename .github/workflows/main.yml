name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "master"
      - "work"
      - "claude/**"

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (skip postinstall)
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js (standalone)
        run: npx next build
        env:
          DATABASE_URL: "postgresql://nexus:nexus@localhost:5432/nexus_db"

      - name: Compile Electron TypeScript
        run: npx tsc -p electron/tsconfig.json

      - name: Build portable EXE
        run: npx electron-builder --win --publish never
        env:
          DATABASE_URL: "postgresql://nexus:nexus@localhost:5432/nexus_db"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Generate SHA256
        shell: pwsh
        run: |
          $file = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          if (-not $file) { throw "EXE artifact not found in dist/" }
          $hash = Get-FileHash $file.FullName -Algorithm SHA256
          "$($file.Name)  $($hash.Hash)" | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii
          Write-Host "✅ $($file.Name) — $($hash.Hash)"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-windows-exe
          path: |
            dist/*.exe
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
