name: windows-installer-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Verify release and installer payload
        run: |
          python scripts/verify_release.py
          python scripts/verify_installer_payload.py

      - name: Build installer
        run: powershell -ExecutionPolicy Bypass -File scripts/build_windows_installer.ps1 -Configuration Release -RequireInno

      - name: Verify installer
        run: |
          python scripts/verify_installer_ready.py
          python scripts/generate_release_manifest.py

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflineDocStudio-setup-${{ github.ref_name }}
          path: dist/OfflineDocStudio-Setup-*.exe
          if-no-files-found: error
